<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1428"/>
      <stop offset="100%" stop-color="#070d1a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5b8fff"/>
      <stop offset="100%" stop-color="#00e0c0"/>
    </linearGradient>
    <linearGradient id="iris" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e0c0"/>
      <stop offset="100%" stop-color="#5b8fff"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>

  <!-- Glow halo -->
  <ellipse cx="96" cy="96" rx="70" ry="40" fill="none" stroke="url(#glow)" stroke-width="1.5" opacity="0.3" filter="url(#blur)"/>

  <!-- Eye shape outline -->
  <path d="M18 96 Q96 30 174 96 Q96 162 18 96Z" fill="none" stroke="url(#glow)" stroke-width="5" stroke-linecap="round" opacity="0.85"/>

  <!-- Iris ring -->
  <circle cx="96" cy="96" r="34" fill="none" stroke="url(#iris)" stroke-width="4" opacity="0.9"/>

  <!-- Pupil -->
  <circle cx="96" cy="96" r="18" fill="url(#glow)"/>

  <!-- Inner pupil dot -->
  <circle cx="96" cy="96" r="7" fill="#070d1a"/>

  <!-- Highlight -->
  <circle cx="106" cy="86" r="4" fill="white" opacity="0.6"/>

  <!-- Bottom label -->
  <text x="96" y="172" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="url(#glow)" text-anchor="middle" letter-spacing="2">VISION</text>
</svg>
